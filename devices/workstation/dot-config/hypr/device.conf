# Monitor configuration
monitor = DP-1, 2560x1440@143.998, 1080x2560, 1

# Decorations
decoration {
    rounding = 12

    blur {
        enabled = true
        size = 4
        passes = 3
        contrast = 1.2
        saturation = 0.8
    }

    shadow {
        enabled = true
        range = 20
        offset = 4 8
    }
}

# Window rules
windowrulev2 = float, class:^(pavucontrol)$

# Key bindings
bind = $mod SHIFT, P, exec, wl-toggle-output alsa_output.pci-0000_0a_00.4.analog-stereo alsa_output.pci-0000_08_00.1.hdmi-stereo

# Autostart
exec-once = steam
