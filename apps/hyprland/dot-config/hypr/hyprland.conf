# vim: set ft=hyprlang :

# Theme (rendered from palette.json by apply-theme)
source = ~/.config/hypr/theme.conf

################
### MONITORS ###
################

# Default monitor config — device.conf overrides this
monitor = , preferred, auto, 1

#############
### INPUT ###
#############

input {
    kb_layout = se, us
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
        middle_button_emulation = true
    }

    sensitivity = 0.15
    accel_profile = adaptive
}

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    layout = dwindle
}

decoration {
    rounding = 4

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
    }
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 2, ease
    animation = windowsOut, 1, 2, ease, popin 80%
    animation = fade, 1, 2, ease
    animation = workspaces, 0, 3, ease, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    force_split = 2
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

#################
### VARIABLES ###
#################

$scripts = ~/.config/hypr/scripts
$mod = SUPER
$term = ghostty
$browser = zen-browser
$tmux = $term --title=terminal -e zsh -lic tmux-launcher
$lock = hyprlock
$menu = tofi-drun | xargs -r hyprctl dispatch exec --

$cursor = BreezeX-RosePine-Linux
$cursor_normal = 28
$cursor_big = 46
$cursor_hide_timeout = 2000

cursor {
    inactive_timeout = 2
}

env = XCURSOR_THEME,$cursor
env = XCURSOR_SIZE,$cursor_normal
env = XDG_CURRENT_DESKTOP,Hyprland

####################
### KEYBINDINGS  ###
####################

# Apps
bind = $mod, T, exec, $tmux
bind = $mod SHIFT, T, exec, $term
bind = $mod SHIFT, Q, killactive
bind = $mod, space, exec, $menu
bind = $mod, U, exec, $browser
bind = $mod, G, exec, ~/.config/gammastep/scripts/gammastep-toggle.sh
# Control center — direct pane access
bind = $mod, A, exec, qs ipc call open-controlcenter-pane open 0
bind = $mod, W, exec, qs ipc call open-controlcenter-pane open 1
bind = $mod, B, exec, qs ipc call open-controlcenter-pane open 2
bind = $mod, N, exec, qs ipc call open-controlcenter-pane open 3
bind = $mod SHIFT, W, exec, $lock
bind = $mod, C, exec, hyprpicker --autocopy
bind = $mod, D, exec, quickshell msg toggle-dashboard toggle
bind = $mod SHIFT, D, exec, dict
bind = $mod SHIFT, Escape, exec, $scripts/scratch-toggle.sh -t btop-float -- foot --title=btop-float -e btop
bind = $mod, P, exec, wl-toggle-pulsemixer
bind = $mod, I, exec, foot --title=tv-float -e zsh -ic 'tv channels'

# Screenshots
bind = $mod SHIFT, Print, exec, wl-screenshot selection
bind = $mod, Print, exec, wl-screenshot focused
bind = , Print, exec, wl-screenshot full

# Appearance
bind = $mod, O, exec, quickshell msg toggle-wallpaper-picker toggle
bind = $mod SHIFT, O, exec, wl-select-theme
bind = $mod, Z, exec, $scripts/toggle-cursor-hide.sh $cursor_hide_timeout
bind = $mod SHIFT, Z, exec, $scripts/toggle-cursor-size.sh $cursor $cursor_normal $cursor_big

# Navigation
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Layout
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, space, togglefloating
bind = $mod, space, cyclenext

# Scratchpad (special workspace)
bind = $mod SHIFT, minus, movetoworkspacesilent, special
bind = $mod, minus, togglespecialworkspace

# Resize submap
bind = $mod, R, submap, resize
submap = resize
bind = , H, resizeactive, -10 0
bind = , J, resizeactive, 0 10
bind = , K, resizeactive, 0 -10
bind = , L, resizeactive, 10 0
bind = , left, resizeactive, -10 0
bind = , down, resizeactive, 0 10
bind = , up, resizeactive, 0 -10
bind = , right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# System submap
bind = $mod SHIFT, E, submap, system
submap = system
bind = , L, exec, $lock
bind = , L, submap, reset
bind = , E, exit
bind = , S, exec, systemctl suspend
bind = , S, submap, reset
bind = , R, exec, systemctl reboot
bind = SHIFT, S, exec, systemctl poweroff -i
bind = SHIFT, R, exec, systemctl reboot --firmware-setup
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Reload config
bind = $mod SHIFT, C, exec, hyprctl reload

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Media — push-to-talk
bind = $mod, M, exec, pactl set-source-mute @DEFAULT_SOURCE@ false
bindr = $mod, M, exec, pactl set-source-mute @DEFAULT_SOURCE@ true
bind = $mod SHIFT, M, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = $mod SHIFT, V, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Volume presets
bind = $mod ALT, 1, exec, pactl set-sink-volume @DEFAULT_SINK@ 10%
bind = $mod ALT, 2, exec, pactl set-sink-volume @DEFAULT_SINK@ 20%
bind = $mod ALT, 3, exec, pactl set-sink-volume @DEFAULT_SINK@ 30%
bind = $mod ALT, 4, exec, pactl set-sink-volume @DEFAULT_SINK@ 40%
bind = $mod ALT, 5, exec, pactl set-sink-volume @DEFAULT_SINK@ 50%
bind = $mod ALT, 6, exec, pactl set-sink-volume @DEFAULT_SINK@ 60%
bind = $mod ALT, 7, exec, pactl set-sink-volume @DEFAULT_SINK@ 70%
bind = $mod ALT, 8, exec, pactl set-sink-volume @DEFAULT_SINK@ 80%
bind = $mod ALT, 9, exec, pactl set-sink-volume @DEFAULT_SINK@ 90%
bind = $mod ALT, 0, exec, pactl set-sink-volume @DEFAULT_SINK@ 100%

# XF86 keys
bindel = , XF86AudioRaiseVolume, exec, wl-modify-volume "+"
bindel = , XF86AudioLowerVolume, exec, wl-modify-volume "-"
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bind = , XF86Search, exec, $menu

# Display
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86ScreenSaver, exec, $lock

###################
### WINDOW RULES ##
###################

windowrule = float on, match:class pavucontrol
windowrule = float on, match:class Godot

windowrule {
    name = btop-float
    match:title = btop-float
    float = on
    size = 1300 800
}

windowrule {
    name = tv-float
    match:title = tv-float
    float = on
    size = 1300 800
}

windowrule {
    name = pulsemixer-float
    match:title = pulsemixer-float
    float = on
    size = 1600 900
}

windowrule = suppress_event idle, match:fullscreen 1

windowrule = workspace 1, match:title terminal
windowrule = workspace 2, match:class zen
windowrule = workspace 3, match:class vesktop
windowrule = workspace 4, match:class steam
windowrule = workspace 4, match:class net.lutris.Lutris
windowrule = workspace 4, match:class gamemoderun
windowrule = workspace 4, match:class gamescope
windowrule = suppress_event idle, match:class gamemoderun
windowrule = suppress_event idle, match:class gamescope

######################
### SESSION STARTUP ##
######################

exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP && systemctl --user start hyprland-session.target
exec-once = hypridle
exec-once = $tmux
exec-once = $browser
exec-once = gammastep -m wayland
exec-once = pactl set-source-mute @DEFAULT_SOURCE@ true

# Private/local overrides (e.g. HA bindings, secrets-dependent config)
source = ~/.config/hypr/local.conf

# Device-specific config
source = ~/.config/hypr/device.conf
