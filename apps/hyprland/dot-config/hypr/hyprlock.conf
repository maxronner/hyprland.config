source = ~/.config/hypr/hyprlock-theme.conf

general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = ~/.local/share/wallpaper/current
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = true
    outer_color = $lock_outer
    inner_color = $lock_inner
    font_color = $lock_font
    check_color = $lock_check
    fail_color = $lock_fail
    position = 0, -20
    halign = center
    valign = center
}
